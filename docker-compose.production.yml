name: lucky-arcade-visual
x-app: &app
  build:
    context: ./lucky-arcade-app
    dockerfile: docker/Dockerfile
  env_file: [.env.production]
  restart: unless-stopped
  depends_on:
    postgres: {condition: service_healthy}
    redis: {condition: service_healthy}
  volumes: [arcade-storage:/var/www/html/storage]
  networks: [arcade]
services:
  app:
    <<: *app
    environment: {RUN_MIGRATIONS: "true", WAIT_FOR_DATABASE: "true"}
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [app]
    ports: ["8080:80"]
    volumes:
      - ./lucky-arcade-app/public:/var/www/html/public:ro
      - ./lucky-arcade-app/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - arcade-storage:/var/www/html/storage:ro
    networks: [arcade]
  scheduler:
    <<: *app
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    environment: {RUN_MIGRATIONS: "false", WAIT_FOR_DATABASE: "true"}
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lucky_arcade}
      POSTGRES_USER: ${DB_USERNAME:-lucky_arcade}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [arcade]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-lucky_arcade} -d ${DB_DATABASE:-lucky_arcade}"]
      interval: 10s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    networks: [arcade]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes: {postgres-data: {}, redis-data: {}, arcade-storage: {}}
networks: {arcade: {}}
